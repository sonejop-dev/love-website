<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Be My Boyfriend 💖</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
  height: 100vh;
  overflow: hidden;
}

h1 {
  margin-top: 100px;
  color: white;
}

button {
  font-size: 20px;
  padding: 12px 25px;
  cursor: pointer;
  z-index: 10;
  position: relative;
}

#yesBtn {
  margin: 20px;
}

#noBtn {
  position: absolute;
}

/* falling items */
.fall {
  position: fixed;
  top: -50px;
  font-size: 24px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}
</style>
</head>

<body>
  <h1>Will you be my boyfriend? 💖</h1>

  <button id="yesBtn" onclick="yes()">Yes 💘</button>
  <button id="noBtn" onmouseover="moveButton()">No 😢</button>

<script>
function yes() {
  alert("Yayyyy 💕 You’re mine now 😝");
}

// ปุ่ม No วิ่งหนี
function moveButton() {
  const button = document.getElementById("noBtn");

  const x = Math.random() * (window.innerWidth - button.offsetWidth);
  const y = Math.random() * (window.innerHeight - button.offsetHeight);

  button.style.left = x + "px";
  button.style.top = y + "px";
}

// สร้างของตก (หัวใจ + ชิบะ)
function createFallingItem() {
  const item = document.createElement("div");
  item.classList.add("fall");

  const things = ["💖", "💕", "💘", "🐕", "🐕‍🦺"];
  item.innerHTML = things[Math.floor(Math.random() * things.length)];

  item.style.left = Math.random() * 100 + "vw";
  item.style.animationDuration = (2 + Math.random() * 3) + "s";

  document.body.appendChild(item);

  setTimeout(() => {
    item.remove();
  }, 5000);
}

// ปล่อยของตกเรื่อยๆ
setInterval(createFallingItem, 300);
</script>
</body>
</html>
